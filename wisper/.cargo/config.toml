# CMake is required to build whisper.cpp (whisper-rs-sys).
# Winget installs to Program Files; Cursor terminals often miss PATH updates.
# CMAKE_C/CXX_COMPILER are set by dev.ps1 / build-gpu.ps1 (not here — MSVC path varies).
[env]
CMAKE = "C:/Program Files/CMake/bin/cmake.exe"

# Metal / Accelerate linking for whisper.cpp on Apple Silicon and Intel Macs.
[target.aarch64-apple-darwin]
rustflags = ["-lc++", "-l", "framework=Accelerate"]

[target.x86_64-apple-darwin]
rustflags = ["-lc++", "-l", "framework=Accelerate"]
